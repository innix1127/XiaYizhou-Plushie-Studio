<!DOCTYPE html>
<html>
<head>
    <title>夏以昼生日玩偶</title>

<style>

/* =========================
   ⭐统一按钮基础
========================= */
button {
    all: unset;
    display: inline-block;
    cursor: pointer;
}

/* =========================
   ⭐上面换脸按钮
========================= */
.face-btn {
    width: 130px;
    padding: 14px 10px;
    margin: 6px 0;

    font-size: 20px;
    font-weight: 700;

    border-radius: 14px;

    background: #613DAA;
    color: #DAA613;

    text-align: center;

    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.face-btn:hover {
    transform: scale(1.06);
}

/* =========================
   ⭐分类按钮
========================= */
.menu-btn {
    width: 130px;
    padding: 14px 10px;
    margin: 6px 0;

    font-size: 20px;
    font-weight: 700;

    border-radius: 14px;

    background: #DAA613;
    color: #613DAA;

    text-align: center;

    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.menu-btn.active {
    background: #613DAA;
    color: #DAA613;
}

</style>

</head>

<body style="background:#fff8f3; text-align:center;">

<h1>🍎 阿昼的 绒绒 衣帽间 🍎</h1>

<p style="color:#888;font-size:18px;">
点击左侧分类 ✦ 点击生成贴纸 ✦ 拖拽 ✦ 缩放 ✦ 删除
</p>

<div style="margin-bottom:20px;">
    <button class="face-btn" onclick="changeBody('body00.png')">小裸昼</button>
    <button class="face-btn" onclick="changeBody('body1.png')">微笑眼</button>
    <button class="face-btn" onclick="changeBody('body2.png')">眯眯眼</button>
    <button class="face-btn" onclick="changeBody('body3.png')">英俊眼</button>
    <button class="face-btn" onclick="changeBody('body4.png')">Wink眼</button>
    <button class="face-btn" onclick="changeBody('body5.png')">困困眼</button>
</div>

<div style="display:flex;justify-content:center;gap:60px;">

<!-- 左侧 -->
<div style="display:flex;gap:15px;">

<div style="display:flex;flex-direction:column;">
<button class="menu-btn" onclick="togglePanel('eye',this)">眼睛</button>
<button class="menu-btn" onclick="togglePanel('mouth',this)">嘴巴</button>
<button class="menu-btn" onclick="togglePanel('cloth',this)">衣服</button>
<button class="menu-btn" onclick="togglePanel('hair',this)">头饰</button>
<button class="menu-btn" onclick="togglePanel('acc',this)">配饰</button>
</div>

<div id="panel" style="display:grid;grid-template-columns:repeat(2,90px);gap:10px;"></div>

</div>

<!-- 中间 -->
<div id="playground" style="position:relative;width:500px;height:650px;">
<img id="doll" src="bodycover.png" width="400"
style="position:absolute;left:50%;transform:translateX(-50%);">
</div>

</div>

<script>

function changeBody(img){
document.getElementById("doll").src = img;
}

const accessories = {
eye:["eye1.png","eye2.png","eye3.png","eye4.png","eye5.png"],
mouth:["mouth1.png","mouth2.png","mouth3.png","mouth4.png","mouth5.png","nose.png"],
cloth:["originalcloth.png","flycloth.png","suitcloth.png","applecloth.png","toastcloth.png"],
hair:["catear.png","chef.png","topknot.png","birthday.png","coconut.png","plane.png","leopard.png"],
acc:["cook.png","pad.png","bow.png","wings.png","earphone.png","sunglass.png"]
};

function togglePanel(type,btn){

const panel=document.getElementById("panel");
panel.innerHTML="";

document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

accessories[type].forEach(src=>{

const img=document.createElement("img");

img.src=src;
img.style.width="80px";
img.style.cursor="pointer";
img.style.background="white";
img.style.border="1px solid #ddd";
img.style.borderRadius="12px";

img.onclick=()=>createAccessory(src,type);

panel.appendChild(img);
});

}

function createAccessory(src,type){

const img=document.createElement("img");

img.src=src;
img.style.position="absolute";
img.style.left="180px";
img.style.top="150px";
img.style.width="100px";
img.style.cursor="move";
img.style.touchAction="none";

let size=100;
let rotation=0;

img.style.transformOrigin="center";

img.addEventListener("wheel",e=>{
e.preventDefault();
size+=e.deltaY<0?10:-10;
if(size<20)size=20;
img.style.width=size+"px";
});

img.addEventListener("contextmenu",e=>{
if(type!=="acc")return;
e.preventDefault();
let startX=e.clientX;

function move(ev){
rotation=(ev.clientX-startX)*0.5;
img.style.transform=`rotate(${rotation}deg)`;
}

function up(){
document.removeEventListener("mousemove",move);
document.removeEventListener("mouseup",up);
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",up);
});

img.addEventListener("dblclick",()=>img.remove());

makeDraggable(img);
enableTouch(img);

document.getElementById("playground").appendChild(img);
}

/* ⭐鼠标拖拽 */
function makeDraggable(el){
let drag=false,ox=0,oy=0;

el.addEventListener("mousedown",e=>{
drag=true;
ox=e.clientX-el.offsetLeft;
oy=e.clientY-el.offsetTop;
el.style.zIndex=Date.now();
});

document.addEventListener("mousemove",e=>{
if(!drag)return;
el.style.left=(e.clientX-ox)+"px";
el.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>drag=false);
}

/* ⭐手机拖拽 */
function enableTouch(el){

let drag=false,ox=0,oy=0;

el.addEventListener("touchstart",e=>{
const t=e.touches[0];
drag=true;
ox=t.clientX-el.offsetLeft;
oy=t.clientY-el.offsetTop;
el.style.zIndex=Date.now();
});

el.addEventListener("touchmove",e=>{
if(!drag)return;
const t=e.touches[0];
el.style.left=(t.clientX-ox)+"px";
el.style.top=(t.clientY-oy)+"px";
});

el.addEventListener("touchend",()=>drag=false);
}

</script>

</body>
</html>
