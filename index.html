<!DOCTYPE html>
<html>
<head>
    <title>夏以昼生日玩偶</title>
</head>

<body style="background:#fff8f3; text-align:center;">

    <h1 style="margin-top:40px;">
        🍎 夏以昼 绒绒 衣帽间 🍎
        
    </h1>

<p style="
    color:#888;
    font-size:16px;
    margin-bottom:25px;
">
    点击左侧配件生成贴纸 ✦ 拖拽摆放 ✦ 滚动鼠标可调整大小 ✦ 双击可删除
</p>
    <div style="margin-bottom:20px;">
        <button onclick="changeBody('body00.png')">小裸昼</button>
        <button onclick="changeBody('body1.png')">微笑眼</button>
        <button onclick="changeBody('body2.png')">眯眯眼</button>
        <button onclick="changeBody('body3.png')">英俊眼</button>
        <button onclick="changeBody('body4.png')">Wink眼</button>
        <button onclick="changeBody('body5.png')">困困眼</button>
    </div>

    <div style="
        display:flex;
        justify-content:center;
        align-items:flex-start;
        gap:40px;
        margin-top:20px;
    ">

        <!-- 配件栏 -->
        <!-- 配件栏 -->
<div style="
    display:grid;
    grid-template-columns:repeat(2,90px);
    gap:12px;
">

    <img src="apple.png"
         onclick="createAccessory('apple.png')"
         style="
            width:80px;
            cursor:pointer;
            background:white;
            border:1px solid #ddd;
            border-radius:12px;
            padding:5px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
         ">

    <img src="catear.png"
         onclick="createAccessory('catear.png')"
         style="
            width:80px;
            cursor:pointer;
            background:white;
            border:1px solid #ddd;
            border-radius:12px;
            padding:5px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
         ">

    <img src="earphone.png"
         onclick="createAccessory('earphone.png')"
         style="
            width:80px;
            cursor:pointer;
            background:white;
            border:1px solid #ddd;
            border-radius:12px;
            padding:5px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
         ">

    <img src="hat1.png"
         onclick="createAccessory('hat1.png')"
         style="
            width:80px;
            cursor:pointer;
            background:white;
            border:1px solid #ddd;
            border-radius:12px;
            padding:5px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
         ">

    <img src="mouth1.png"
         onclick="createAccessory('mouth1.png')"
         style="
            width:80px;
            cursor:pointer;
            background:white;
            border:1px solid #ddd;
            border-radius:12px;
            padding:5px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
         ">

    <img src="nose.png"
         onclick="createAccessory('nose.png')"
         style="
            width:80px;
            cursor:pointer;
            background:white;
            border:1px solid #ddd;
            border-radius:12px;
            padding:5px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
         ">
</div>

        <!-- 娃娃区域 -->
        <div id="playground"
             style="
                position:relative;
                width:500px;
                height:650px;
             ">

            <img
                id="doll"
                src="bodycover.png"
                width="400"
                alt="奇迹小昼"
                style="
                    position:absolute;
                    left:50%;
                    transform:translateX(-50%);
                "
            >

        </div>

    </div>

    <script>

        function changeBody(image) {
            document.getElementById("doll").src = image;
        }

        function createAccessory(src) {

            const img = document.createElement("img");

            img.src = src;

            img.style.position = "absolute";
            img.style.left = "180px";
            img.style.top = "150px";
            img.style.width = "100px";
            img.style.cursor = "move";
            img.style.userSelect = "none";

            let currentSize = 100;

            /* 滚轮缩放 */
            img.addEventListener("wheel", function(e) {

                e.preventDefault();

                if (e.deltaY < 0) {
                    currentSize += 10;
                } else {
                    currentSize -= 10;
                }

                if (currentSize < 20) {
                    currentSize = 20;
                }

                img.style.width = currentSize + "px";
            });

            /* 双击删除 */
            img.addEventListener("dblclick", function() {
                img.remove();
            });

            makeDraggable(img);

            document
                .getElementById("playground")
                .appendChild(img);
        }

        function makeDraggable(element) {

            let isDragging = false;
            let offsetX = 0;
            let offsetY = 0;

            element.addEventListener("mousedown", function(e) {

                isDragging = true;

                offsetX = e.clientX - element.offsetLeft;
                offsetY = e.clientY - element.offsetTop;

                element.style.zIndex = Date.now();
            });

            document.addEventListener("mousemove", function(e) {

                if (!isDragging) return;

                element.style.left =
                    (e.clientX - offsetX) + "px";

                element.style.top =
                    (e.clientY - offsetY) + "px";
            });

            document.addEventListener("mouseup", function() {
                isDragging = false;
            });
        }

    </script>

</body>
</html>
