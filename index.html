<!DOCTYPE html>
<html>
<head>
    <title>夏以昼生日玩偶</title>

<style>

/* =========================
   ⭐统一按钮基础（彻底去冲突）
========================= */
button {
    all: unset;
    display: inline-block;
    cursor: pointer;
}

/* =========================
   ⭐上面换脸按钮（紫底金字）
========================= */
.face-btn {
    width: 130px;
    padding: 14px 10px;
    margin: 6px 0;

    font-size: 16px;
    font-weight: 700;

    border-radius: 14px;

    background: #613DAA;
    color: #DAA613;

    text-align: center;

    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.face-btn:hover {
    transform: scale(1.06);
}

/* =========================
   ⭐下面分类按钮（金底紫字）
========================= */
.menu-btn {
    width: 130px;
    padding: 14px 10px;
    margin: 6px 0;

    font-size: 16px;
    font-weight: 700;

    border-radius: 14px;

    background: #DAA613;
    color: #613DAA;

    text-align: center;

    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.menu-btn:hover {
    transform: scale(1.05);
}

/* ⭐选中高亮 */
.menu-btn.active {
    background: #613DAA;
    color: #DAA613;
    box-shadow: 0 0 12px rgba(97, 61, 170, 0.6);
    transform: scale(1.06);
}

</style>

</head>

<body style="background:#fff8f3; text-align:center;">

<h1 style="margin-top:40px;">
    🍎 阿昼的 绒绒 衣帽间 🍎
</h1>

<p style="color:#888; font-size:16px; margin-bottom:25px;">
    点击左侧分类选择配件 ✦ 点击图片生成贴纸 ✦ 拖拽摆放 ✦ 滚轮缩放 ✦ 双击删除
</p>

<p style="color:#aaa; font-size:14px;">
    （感谢 @Miki在进步老师的高清png贴图）
</p>

<!-- ⭐上面换脸按钮 -->
<div style="margin-bottom:20px;">
    <button class="face-btn" onclick="changeBody('body00.png')">小裸昼</button>
    <button class="face-btn" onclick="changeBody('body1.png')">微笑眼</button>
    <button class="face-btn" onclick="changeBody('body2.png')">眯眯眼</button>
    <button class="face-btn" onclick="changeBody('body3.png')">英俊眼</button>
    <button class="face-btn" onclick="changeBody('body4.png')">Wink眼</button>
    <button class="face-btn" onclick="changeBody('body5.png')">困困眼</button>
</div>

<div style="
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:60px;
    margin-top:20px;
    transform: translateX(-40px);
">

<!-- ⭐左侧 -->
<div style="display:flex; gap:15px; align-items:flex-start;">

    <!-- 按钮列 -->
    <div style="display:flex; flex-direction:column;">
        <button class="menu-btn" onclick="togglePanel('eye', this)">眼睛</button>
        <button class="menu-btn" onclick="togglePanel('mouth', this)">嘴巴</button>
        <button class="menu-btn" onclick="togglePanel('cloth', this)">衣服</button>
        <button class="menu-btn" onclick="togglePanel('hair', this)">头饰</button>
        <button class="menu-btn" onclick="togglePanel('acc', this)">配饰</button>
    </div>

    <!-- 图片区 -->
    <div id="panel"
         style="
            display:grid;
            grid-template-columns:repeat(2,90px);
            gap:10px;
         ">
    </div>

</div>

<!-- ⭐中间娃娃 -->
<div id="playground"
     style="
        position:relative;
        width:500px;
        height:650px;
     ">

    <img id="doll"
         src="bodycover.png"
         width="400"
         style="
            position:absolute;
            left:50%;
            transform:translateX(-50%);
         ">

</div>

</div>

<script>

function changeBody(image) {
    document.getElementById("doll").src = image;
}

/* ⭐素材库 */
const accessories = {
    eye: ["eye1.png","eye2.png","eye3.png","eye4.png","eye5.png"],
    mouth: ["mouth1.png","mouth2.png","mouth3.png","mouth4.png","mouth5.png","nose.png"],
    cloth: ["originalcloth.png","flycloth.png","suitcloth.png","applecloth.png","toastcloth.png"],
    hair: ["catear.png","chef.png","topknot.png","birthday.png","coconut.png","plane.png","leopard.png"],
    acc: ["pad.png","bow.png","cook.png","wings.png","earphone.png","sunglass.png"]
};

function togglePanel(type, btn) {

    const panel = document.getElementById("panel");
    panel.innerHTML = "";

    document.querySelectorAll(".menu-btn").forEach(b => {
        b.classList.remove("active");
    });

    btn.classList.add("active");

    accessories[type].forEach(src => {

        const img = document.createElement("img");

        img.src = src;
        img.style.width = "80px";
        img.style.cursor = "pointer";
        img.style.background = "white";
        img.style.border = "1px solid #ddd";
        img.style.borderRadius = "12px";
        img.style.padding = "5px";
        img.style.boxShadow = "0 2px 6px rgba(0,0,0,0.08)";

        img.onclick = () => createAccessory(src);

        panel.appendChild(img);
    });
}

function createAccessory(src) {

    const img = document.createElement("img");

    img.src = src;
    img.style.position = "absolute";
    img.style.left = "180px";
    img.style.top = "150px";
    img.style.width = "100px";
    img.style.cursor = "move";
    img.style.userSelect = "none";

    let size = 100;

    img.addEventListener("wheel", function(e) {
        e.preventDefault();
        size += (e.deltaY < 0 ? 10 : -10);
        if (size < 20) size = 20;
        img.style.width = size + "px";
    });

    img.addEventListener("dblclick", () => img.remove());

    makeDraggable(img);

    document.getElementById("playground").appendChild(img);
}

function makeDraggable(el) {

    let dragging = false;
    let ox = 0, oy = 0;

    el.addEventListener("mousedown", e => {
        dragging = true;
        ox = e.clientX - el.offsetLeft;
        oy = e.clientY - el.offsetTop;
        el.style.zIndex = Date.now();
    });

    document.addEventListener("mousemove", e => {
        if (!dragging) return;
        el.style.left = (e.clientX - ox) + "px";
        el.style.top = (e.clientY - oy) + "px";
    });

    document.addEventListener("mouseup", () => dragging = false);
}

/* ⭐默认打开 */
window.onload = () => {
    const firstBtn = document.querySelector(".menu-btn");

    if (firstBtn) {
        // ❗只展开内容，不传入“选中按钮”
        togglePanel("eye", null);
    }
};

</script>

</body>
</html>
