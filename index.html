<!DOCTYPE html>
<html>
<head>
    <title>夏以昼生日玩偶</title>
</head>

<body style="background:#fff8f3; text-align:center;">

    <h1 style="margin-top:40px;">
        🍎 夏以昼 Plushie Studio 🍎
    </h1>

    <div style="margin-bottom:20px;">
        <button onclick="changeBody('body1.png')">微笑眼</button>
        <button onclick="changeBody('body2.png')">眯眯眼</button>
        <button onclick="changeBody('body3.png')">英俊眼</button>
        <button onclick="changeBody('body4.png')">Wink眼</button>
        <button onclick="changeBody('body5.png')">困困眼</button>
    </div>

    <div style="
        display:flex;
        justify-content:center;
        align-items:flex-start;
        gap:40px;
        margin-top:20px;
    ">

        <!-- 配件栏 -->
        <div style="
            display:flex;
            flex-direction:column;
            gap:10px;
        ">
            <button onclick="createAccessory('apple.png')">🍎 苹果</button>
            <button onclick="createAccessory('catear.png')">🐱 猫耳</button>
            <button onclick="createAccessory('earphone.png')">🎧 耳机</button>
            <button onclick="createAccessory('hat1.png')">🎩 帽子</button>
            <button onclick="createAccessory('mouth1.png')">👄 嘴巴</button>
            <button onclick="createAccessory('nose.png')">👃 鼻子</button>
        </div>

        <!-- 娃娃区域 -->
        <div id="playground"
             style="
                position:relative;
                width:500px;
                height:650px;
             ">

            <img
                id="doll"
                src="body1.png"
                width="400"
                alt="奇迹小昼"
                style="
                    position:absolute;
                    left:50%;
                    transform:translateX(-50%);
                "
            >

        </div>

    </div>

    <script>

        function changeBody(image) {
            document.getElementById("doll").src = image;
        }

        function createAccessory(src) {

            const img = document.createElement("img");

            img.src = src;

            img.style.position = "absolute";
            img.style.left = "180px";
            img.style.top = "150px";
            img.style.width = "100px";
            img.style.cursor = "move";
            img.style.userSelect = "none";

            let currentSize = 100;

            /* 滚轮缩放 */
            img.addEventListener("wheel", function(e) {

                e.preventDefault();

                if (e.deltaY < 0) {
                    currentSize += 10;
                } else {
                    currentSize -= 10;
                }

                if (currentSize < 20) {
                    currentSize = 20;
                }

                img.style.width = currentSize + "px";
            });

            /* 双击删除 */
            img.addEventListener("dblclick", function() {
                img.remove();
            });

            makeDraggable(img);

            document
                .getElementById("playground")
                .appendChild(img);
        }

        function makeDraggable(element) {

            let isDragging = false;
            let offsetX = 0;
            let offsetY = 0;

            element.addEventListener("mousedown", function(e) {

                isDragging = true;

                offsetX = e.clientX - element.offsetLeft;
                offsetY = e.clientY - element.offsetTop;

                element.style.zIndex = Date.now();
            });

            document.addEventListener("mousemove", function(e) {

                if (!isDragging) return;

                element.style.left =
                    (e.clientX - offsetX) + "px";

                element.style.top =
                    (e.clientY - offsetY) + "px";
            });

            document.addEventListener("mouseup", function() {
                isDragging = false;
            });
        }

    </script>

</body>
</html>
